# ════════════════════════════════════════════════════
#  UNIVERS HOLE — Configuration Netlify (corrigée)
# ════════════════════════════════════════════════════

[build]
  publish   = "."                   # fichiers à la racine du repo
  functions = "netlify/functions"   # fonctions serverless

[functions]
  node_bundler = "esbuild"

# Redirect /api/send-email → fonction Netlify
[[redirects]]
  from   = "/api/send-email"
  to     = "/.netlify/functions/send-email"
  status = 200
  force  = true

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"